name: jobscouter
description: "JobScouter - Track Your Job Search. Land Your Dream Job."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^3.1.0
  riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Routing
  go_router: ^17.0.1
  
  # Networking
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  pretty_dio_logger: ^1.4.0
  
  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  
  # UI Components
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  fl_chart: ^1.1.1
  
  # Forms
  reactive_forms: ^18.0.2
  
  # Date/Time
  intl: ^0.20.2
  
  # Notifications
  flutter_local_notifications: ^19.0.0
  
  # Utils
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  
  # OAuth / Social Login
  google_sign_in: ^7.2.0
  
  # Image Picker
  image_picker: ^1.1.2
  
  # File Management
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  
  # Pull to Refresh
  pull_to_refresh: ^2.0.0
  
  # Animations
  lottie: ^3.3.1
  
  # Voice Features
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  
  # CSV Parsing
  csv: ^6.0.0
  
  # UUID Generation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0+1
  retrofit_generator: ^10.2.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
